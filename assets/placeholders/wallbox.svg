<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300" role="img" aria-label="Wallbox (Platzhalter)">
  <defs>
    <linearGradient id="wbBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3a42"/>
      <stop offset="1" stop-color="#111114"/>
    </linearGradient>
    <radialGradient id="wbPort" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#2b2b31"/>
      <stop offset="1" stop-color="#0a0a0c"/>
    </radialGradient>
  </defs>

  <!-- Schatten -->
  <ellipse cx="120" cy="284" rx="74" ry="12" fill="rgba(60,0,30,.28)"/>

  <!-- Korpus -->
  <rect x="54" y="14" width="132" height="262" rx="22" fill="url(#wbBody)" stroke="rgba(255,255,255,.08)"/>

  <!-- LED-Streifen links -->
  <rect x="64" y="40" width="7" height="150" rx="3.5" fill="#19c3ff" opacity=".85"/>

  <!-- Mitsubishi-Andeutung: drei Diamanten -->
  <g fill="#e2001a" transform="translate(120 70)">
    <polygon points="0,-15 9,0 0,15 -9,0"/>
    <polygon points="-19,-4 -10,11 -28,11" transform="rotate(0)"/>
    <polygon points="19,-4 10,11 28,11"/>
  </g>
  <text x="120" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" letter-spacing="1.5" fill="#cfcfd6">MOTORS</text>

  <!-- Ladeport -->
  <circle cx="120" cy="178" r="46" fill="url(#wbPort)" stroke="rgba(255,255,255,.1)" stroke-width="2"/>
  <circle cx="120" cy="178" r="30" fill="none" stroke="#4a4a52" stroke-width="3"/>
  <circle cx="120" cy="163" r="6" fill="#6a6a74"/>
  <circle cx="107" cy="186" r="5" fill="#6a6a74"/>
  <circle cx="133" cy="186" r="5" fill="#6a6a74"/>

</svg>
