<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mitsubishi WOW – Kampagne (Aufbau)</title>
<style>
/* ===== Mitsubishi Markenschrift (MMC) ===== */
@font-face{ font-family:"MMC"; font-weight:400; font-display:swap;
  src:url("assets/fonts/MMCRegular.woff") format("woff"); }
@font-face{ font-family:"MMC"; font-weight:700; font-display:swap;
  src:url("assets/fonts/MMCBold.woff2") format("woff2"),
      url("assets/fonts/MMCBold.woff") format("woff"); }

*{ box-sizing:border-box; margin:0; padding:0; }
body{ font-family:"MMC",system-ui,Arial,sans-serif; color:#fff; background:#fff; }

/* ============================================================
   WOW-MODUL (fullwidth) — Phase 1: STATIK, keine Animation
   ============================================================ */
.wow-module{ width:100%; }
.wow-module sup{ font-size:.55em; vertical-align:super; }

/* ---------- STEP 1: Cover / Hero ---------- */
.cover{ position:relative; width:100%; min-height:100vh; overflow:hidden;
  display:flex; flex-direction:column; align-items:center;
  background:radial-gradient(120% 110% at 50% 0%,
    #ffd9a6 0%, #ffb38a 22%, #ff8aa6 46%, #ff5fae 68%, #d95fce 100%); }

.cover-logo{ position:absolute; top:26px; left:32px; width:clamp(82px,8vw,120px); z-index:3; }
.cover-valid{ position:absolute; top:28px; right:32px; z-index:3; background:#e2001a;
  color:#fff; font-weight:700; text-transform:uppercase; line-height:1.2;
  padding:12px 16px; border-radius:8px; font-size:clamp(11px,1.2vw,15px);
  text-align:left; max-width:170px; box-shadow:0 8px 22px rgba(0,0,0,.22); }

/* WoW-Grafik (echt, transparentes PNG) – statisch, mittig */
.cover-wow{ width:min(620px,72%); margin-top:13vh; z-index:2; pointer-events:none; }

/* Fahrzeug */
.cover-car{ width:min(720px,92%); margin-top:-4vh; z-index:1;
  filter:drop-shadow(0 28px 36px rgba(0,0,0,.28)); }

/* Rote Angebots-Leiste */
.cover-bar{ width:100%; background:#e2001a; color:#fff; margin-top:auto;
  display:flex; align-items:center; justify-content:center; gap:clamp(16px,3vw,46px);
  padding:18px 24px; flex-wrap:wrap; text-align:center; }
.cover-bar .anz{ font-weight:700; text-transform:uppercase; line-height:1.05;
  font-size:clamp(16px,2.2vw,28px); }
.cover-bar .price{ font-weight:700; font-size:clamp(52px,9vw,104px); line-height:.9; letter-spacing:-.01em; }
.cover-bar .price .eur{ font-size:.5em; }
.cover-bar .model{ font-weight:700; text-transform:uppercase; line-height:1.1;
  font-size:clamp(14px,1.8vw,22px); text-align:left; }

@media (max-width:760px){
  .cover-wow{ margin-top:16vh; width:88%; }
  .cover-car{ margin-top:0; width:100%; }
  .cover-bar{ gap:14px; }
}
</style>
</head>
<body>

<div class="wow-module">

  <!-- ===== STEP 1: COVER / HERO (statisch) ===== -->
  <section class="cover">
    <img class="cover-logo" src="assets/logo-mitsubishi-black.svg" alt="Mitsubishi Motors">
    <div class="cover-valid">WOW-Angebote gültig bis 31.12.2026</div>

    <img class="cover-wow" src="assets/header/wow.png" alt="WOW">
    <img class="cover-car" src="assets/cars/outlander.png" alt="Mitsubishi Outlander Diamant">

    <div class="cover-bar">
      <span class="anz">Ohne<br>Anzahlung</span>
      <span class="price">189<span class="eur">€</span><sup>X</sup></span>
      <span class="model">Outlander Diamant<br>mtl. leasen</span>
    </div>
  </section>

  <!-- Steps 2–5 folgen: ASX & Grandis, Outlander Diamant/Black, Eclipse/L200, CTA -->

</div>
</body>
</html>
